<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notic.ia</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}">
</head>

<body>
<main>
    <h1>
        <span class="logo-color-1">Notic.</span>
        <span class="logo-color-2">ia</span>
    </h1>

    <h3>
        Comece o dia bem informado: receba todos os dias, às 7h, um resumo com as
        principais notícias direto no seu e-mail.
    </h3>

    <!-- mensagem principal -->
    <h3 th:text="${message} ?: ''"></h3>

    <!-- FORMULÁRIO (estado inicial ou erro) -->
    <form th:action="@{/subscribe}" method="post"
          th:if="${success == null or success == false}">

        <input type="email"
               name="email"
               placeholder="Digite seu e-mail"
               th:value="${email}"
               required>

        <input type="submit" value="Inscrever">
    </form>

    <!-- SUCESSO -->
    <div th:if="${success}">
        <p>Inscrição realizada com sucesso 🎉</p>

        <form th:action="@{/subscribe}" method="get">
            <button type="submit">Inscrever outro e-mail</button>
        </form>
    </div>
    <p><small>Para cancelar a inscrição, utilize o link presente nos emails</small></p>
</main>

<footer>
    <p>© 2026 – Gabriel Avelar</p>
    <div class="social">
        <a href="https://www.linkedin.com/in/gabrielvavelar/" target="_blank">LinkedIn</a>
        <a href="https://github.com/gabrielvavelar" target="_blank">GitHub</a>
        <a href="mailto:gabrielvavelar@gmail.com">Email</a>
    </div>
</footer>
</body>
</html>
